<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Target-X candidate cluster map">
  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="60" y="75" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#10233f">Target-X Candidate Cluster Map</text>
  <text x="60" y="112" font-family="Inter, Arial, sans-serif" font-size="18" fill="#64748b">Clusters combine epitope hypothesis, human-likeness, similarity guardrails, and developability risk.</text>
  <g transform="translate(110 170)">
    <rect width="980" height="500" rx="26" fill="#ffffff" stroke="#dbe4ef" stroke-width="2"/>
    <line x1="80" y1="420" x2="920" y2="420" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="80" y1="60" x2="80" y2="420" stroke="#cbd5e1" stroke-width="2"/>
    <text x="500" y="470" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#64748b">Predicted epitope separation</text>
    <text x="25" y="250" transform="rotate(-90 25 250)" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#64748b">Developability confidence</text>
    <g opacity="0.14">
      <circle cx="300" cy="190" r="120" fill="#2563eb"/>
      <circle cx="590" cy="220" r="110" fill="#0f9f8f"/>
      <circle cx="760" cy="305" r="90" fill="#8b5cf6"/>
      <circle cx="420" cy="340" r="75" fill="#f97316"/>
    </g>
    <g font-family="Inter, Arial, sans-serif" font-weight="800">
      <text x="244" y="82" font-size="18" fill="#1d4ed8">E1 primary</text>
      <text x="540" y="110" font-size="18" fill="#0f766e">E2 backup</text>
      <text x="720" y="210" font-size="18" fill="#6d28d9">E3 control</text>
      <text x="350" y="392" font-size="18" fill="#9a3412">filtered risk</text>
    </g>
    <g fill="#1d4ed8" stroke="#ffffff" stroke-width="3">
      <circle cx="246" cy="184" r="13"/><circle cx="286" cy="160" r="13"/><circle cx="318" cy="206" r="13"/><circle cx="348" cy="176" r="13"/><circle cx="278" cy="226" r="13"/>
    </g>
    <g fill="#0f9f8f" stroke="#ffffff" stroke-width="3">
      <circle cx="545" cy="210" r="13"/><circle cx="588" cy="186" r="13"/><circle cx="632" cy="228" r="13"/><circle cx="610" cy="262" r="13"/>
    </g>
    <g fill="#8b5cf6" stroke="#ffffff" stroke-width="3">
      <circle cx="742" cy="300" r="13"/><circle cx="782" cy="280" r="13"/><circle cx="805" cy="330" r="13"/>
    </g>
    <g fill="#f97316" stroke="#ffffff" stroke-width="3">
      <circle cx="390" cy="350" r="13"/><circle cx="430" cy="330" r="13"/><circle cx="462" cy="362" r="13"/>
    </g>
  </g>
  <g transform="translate(150 680)" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">
    <circle cx="0" cy="0" r="8" fill="#1d4ed8"/><text x="18" y="6">Primary E1</text>
    <circle cx="160" cy="0" r="8" fill="#0f9f8f"/><text x="178" y="6">Backup E2</text>
    <circle cx="330" cy="0" r="8" fill="#8b5cf6"/><text x="348" y="6">Control E3</text>
    <circle cx="500" cy="0" r="8" fill="#f97316"/><text x="518" y="6">Risk-filtered</text>
  </g>
