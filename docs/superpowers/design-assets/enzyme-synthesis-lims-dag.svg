<svg xmlns="http://www.w3.org/2000/svg" width="2600" height="6200" viewBox="0 0 2600 6200" role="img" aria-labelledby="title desc">
  <title id="title">酶合成实验流程 LIMS Pipeline DAG</title>
  <desc id="desc">实验室负责人通过 Agent 运行已编排的 LIMS Pipeline，覆盖工单派发、设备回调、QC gate、数据入库和效率分析。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#334155" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#0f766e" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#b45309" />
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 58px; font-weight: 900; fill: #0f172a; }
      .subtitle { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #64748b; }
      .stage { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 28px; font-weight: 900; fill: #0f766e; letter-spacing: 0; }
      .node-title { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 33px; font-weight: 900; fill: #0f172a; }
      .node-sub { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 25px; font-weight: 750; fill: #64748b; }
      .small { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 24px; font-weight: 800; fill: #475569; }
      .arrow { fill: none; stroke: #334155; stroke-width: 5; marker-end: url(#arrow); }
      .arrow-soft { fill: none; stroke: #64748b; stroke-width: 4; marker-end: url(#arrow); }
      .arrow-callback { fill: none; stroke: #0f766e; stroke-width: 5; marker-end: url(#arrow-blue); }
      .arrow-return { fill: none; stroke: #b45309; stroke-width: 5; stroke-dasharray: 16 14; marker-end: url(#arrow-red); }
      .label { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 24px; font-weight: 900; fill: #334155; }
      .node { fill: #ffffff; stroke: #cbd5e1; stroke-width: 3; filter: url(#shadow); }
      .user { fill: #eff6ff; stroke: #60a5fa; }
      .pipeline { fill: #f0fdfa; stroke: #2dd4bf; }
      .work { fill: #f1f5f9; stroke: #94a3b8; }
      .callback { fill: #ecfeff; stroke: #22d3ee; }
      .gate { fill: #fffbeb; stroke: #f59e0b; }
      .issue { fill: #fff7ed; stroke: #fb923c; }
      .data { fill: #f0fdf4; stroke: #22c55e; }
      .output { fill: #faf5ff; stroke: #a855f7; }
      .lane { fill: #ffffff; stroke: #e2e8f0; stroke-width: 2; opacity: 0.7; }
    </style>
  </defs>

  <rect class="bg" width="2600" height="5200" />
  <text class="title" x="120" y="100">酶合成实验流程项目：LIMS Pipeline 运行 DAG</text>
  <text class="subtitle" x="120" y="155">负责人已编排标准实验室流程，Agent 负责自动派单、监控设备/人员回调、处理 QC gate、入库数据并输出效率分析。</text>

  <rect class="lane" x="80" y="250" width="2440" height="5850" rx="26" />

  <text class="stage" x="120" y="285">01 · 启动与范围锁定</text>
  <text class="stage" x="120" y="1135">02 · 资源准备与工单包</text>
  <text class="stage" x="120" y="1785">03 · 多工单执行与设备回调</text>
  <text class="stage" x="120" y="2745">04 · 表达、纯化和 QC gate</text>
  <text class="stage" x="120" y="4685">05 · 数据入库、补录和效率分析</text>

  <!-- Top sequence -->
  <rect class="node user" x="900" y="320" width="800" height="150" rx="22" />
  <text class="node-title" x="1300" y="382" text-anchor="middle">负责人启动实验运行</text>
  <text class="node-sub" x="1300" y="424" text-anchor="middle">Run LIMS Pipeline</text>

  <rect class="node pipeline" x="900" y="540" width="800" height="150" rx="22" />
  <text class="node-title" x="1300" y="602" text-anchor="middle">读取已编排 Pipeline</text>
  <text class="node-sub" x="1300" y="644" text-anchor="middle">标准 LIMS 工作流契约</text>

  <rect class="node pipeline" x="900" y="760" width="800" height="150" rx="22" />
  <text class="node-title" x="1300" y="822" text-anchor="middle">锁定本轮实验范围</text>
  <text class="node-sub" x="1300" y="864" text-anchor="middle">样本 / 批次 / 交付物 / SLA</text>

  <path class="node gate" d="M1300 1000 L1640 1085 L1300 1170 L960 1085 Z" />
  <text class="node-title" x="1300" y="1078" text-anchor="middle">负责人确认启动?</text>
  <text class="node-sub" x="1300" y="1118" text-anchor="middle">OK 后 Agent 自动运行</text>

  <path class="arrow" d="M1300 470 L1300 535" />
  <path class="arrow" d="M1300 690 L1300 755" />
  <path class="arrow" d="M1300 910 L1300 990" />
  <path class="arrow-return" d="M960 1085 C760 1085 760 835 890 835" />
  <text class="label" x="745" y="1005">修改范围</text>

  <!-- Resource preparation -->
  <rect class="node pipeline" x="900" y="1250" width="800" height="150" rx="22" />
  <text class="node-title" x="1300" y="1312" text-anchor="middle">样本注册与条码生成</text>
  <text class="node-sub" x="1300" y="1354" text-anchor="middle">Sample Registry / Barcode</text>

  <rect class="node work" x="200" y="1490" width="700" height="150" rx="22" />
  <text class="node-title" x="550" y="1552" text-anchor="middle">库存与物料检查</text>
  <text class="node-sub" x="550" y="1594" text-anchor="middle">试剂 / 耗材 / 批次 QC</text>

  <rect class="node work" x="1600" y="1490" width="700" height="150" rx="22" />
  <text class="node-title" x="1950" y="1552" text-anchor="middle">设备与人员排期</text>
  <text class="node-sub" x="1950" y="1594" text-anchor="middle">机器人 / 设备 / 技术员</text>

  <path class="node gate" d="M550 1735 L855 1815 L550 1895 L245 1815 Z" />
  <text class="node-title" x="550" y="1808" text-anchor="middle">物料是否可用?</text>
  <text class="node-sub" x="550" y="1848" text-anchor="middle">库存 / 批次 / 放行</text>

  <rect class="node issue" x="90" y="2020" width="640" height="150" rx="22" />
  <text class="node-title" x="410" y="2082" text-anchor="middle">补料或替代批次工单</text>
  <text class="node-sub" x="410" y="2124" text-anchor="middle">Procurement / Lot Replacement</text>

  <rect class="node pipeline" x="900" y="2020" width="800" height="150" rx="22" />
  <text class="node-title" x="1300" y="2082" text-anchor="middle">生成执行工单包</text>
  <text class="node-sub" x="1300" y="2124" text-anchor="middle">Work Order Bundle</text>

  <path class="arrow" d="M1300 1170 L1300 1245" />
  <path class="arrow-soft" d="M1180 1400 C880 1440 660 1445 550 1490" />
  <path class="arrow-soft" d="M1420 1400 C1720 1440 1840 1445 1950 1490" />
  <path class="arrow" d="M550 1640 L550 1725" />
  <path class="arrow-return" d="M245 1815 C110 1815 95 1970 170 2020" />
  <text class="label" x="185" y="1780">否</text>
  <path class="arrow-return" d="M410 2020 C400 1850 450 1685 515 1645" />
  <path class="arrow" d="M855 1815 C980 1815 1110 1940 1230 2015" />
  <text class="label" x="900" y="1780">是</text>
  <path class="arrow-soft" d="M1950 1640 C1900 1800 1660 1960 1430 2015" />

  <!-- Work orders -->
  <rect class="node work" x="110" y="2300" width="640" height="150" rx="22" />
  <text class="node-title" x="430" y="2362" text-anchor="middle">工单 01 · 构建准备</text>
  <text class="node-sub" x="430" y="2404" text-anchor="middle">DNA / 构建 / 质粒准备</text>

  <rect class="node work" x="930" y="2300" width="640" height="150" rx="22" />
  <text class="node-title" x="1250" y="2362" text-anchor="middle">工单 02 · 表达准备</text>
  <text class="node-sub" x="1250" y="2404" text-anchor="middle">培养基 / 诱导 / 批次条件</text>

  <rect class="node work" x="1750" y="2300" width="640" height="150" rx="22" />
  <text class="node-title" x="2070" y="2362" text-anchor="middle">工单 03 · 检测准备</text>
  <text class="node-sub" x="2070" y="2404" text-anchor="middle">板图 / 读数方法 / QC</text>

  <rect class="node callback" x="110" y="2580" width="640" height="150" rx="22" />
  <text class="node-title" x="430" y="2642" text-anchor="middle">构建系统回调</text>
  <text class="node-sub" x="430" y="2684" text-anchor="middle">完成 / 失败 / 异常备注</text>

  <rect class="node callback" x="930" y="2580" width="640" height="150" rx="22" />
  <text class="node-title" x="1250" y="2642" text-anchor="middle">表达系统回调</text>
  <text class="node-sub" x="1250" y="2684" text-anchor="middle">培养条件 / 批次状态</text>

  <rect class="node callback" x="1750" y="2580" width="640" height="150" rx="22" />
  <text class="node-title" x="2070" y="2642" text-anchor="middle">检测系统回调</text>
  <text class="node-sub" x="2070" y="2684" text-anchor="middle">检测面板就绪 / QC</text>

  <path class="arrow-soft" d="M1180 2170 C900 2220 650 2250 430 2295" />
  <path class="arrow" d="M1300 2170 L1250 2295" />
  <path class="arrow-soft" d="M1420 2170 C1660 2220 1900 2250 2070 2295" />
  <path class="arrow-callback" d="M430 2450 L430 2575" />
  <path class="arrow-callback" d="M1250 2450 L1250 2575" />
  <path class="arrow-callback" d="M2070 2450 L2070 2575" />

  <!-- QC and execution -->
  <path class="node gate" d="M430 2865 L720 2945 L430 3025 L140 2945 Z" />
  <text class="node-title" x="430" y="2938" text-anchor="middle">构建 QC</text>
  <text class="node-sub" x="430" y="2978" text-anchor="middle">序列 / 条码 / 污染</text>

  <rect class="node issue" x="90" y="3200" width="640" height="150" rx="22" />
  <text class="node-title" x="410" y="3262" text-anchor="middle">返工工单</text>
  <text class="node-sub" x="410" y="3304" text-anchor="middle">重新构建 / 人工复核</text>

  <rect class="node work" x="930" y="3200" width="640" height="150" rx="22" />
  <text class="node-title" x="1250" y="3262" text-anchor="middle">表达与培养执行</text>
  <text class="node-sub" x="1250" y="3304" text-anchor="middle">Incubator / Bioreactor</text>

  <rect class="node pipeline" x="1750" y="3200" width="640" height="150" rx="22" />
  <text class="node-title" x="2070" y="3262" text-anchor="middle">检测面板锁定</text>
  <text class="node-sub" x="2070" y="3304" text-anchor="middle">活性 / 纯度 / 稳定性</text>

  <rect class="node callback" x="930" y="3480" width="640" height="150" rx="22" />
  <text class="node-title" x="1250" y="3542" text-anchor="middle">表达数据回调</text>
  <text class="node-sub" x="1250" y="3584" text-anchor="middle">OD / Harvest / Batch Log</text>

  <path class="node gate" d="M1250 3755 L1560 3835 L1250 3915 L940 3835 Z" />
  <text class="node-title" x="1250" y="3828" text-anchor="middle">表达是否达标?</text>
  <text class="node-sub" x="1250" y="3868" text-anchor="middle">产量 / 批次 / 异常</text>

  <rect class="node issue" x="420" y="4050" width="640" height="150" rx="22" />
  <text class="node-title" x="740" y="4112" text-anchor="middle">表达异常处理</text>
  <text class="node-sub" x="740" y="4154" text-anchor="middle">重跑 / 终止 / 升级</text>

  <rect class="node work" x="930" y="4260" width="640" height="150" rx="22" />
  <text class="node-title" x="1250" y="4322" text-anchor="middle">纯化工单</text>
  <text class="node-sub" x="1250" y="4364" text-anchor="middle">Purification Station</text>

  <rect class="node callback" x="930" y="4480" width="640" height="150" rx="22" />
  <text class="node-title" x="1250" y="4542" text-anchor="middle">纯化设备回调</text>
  <text class="node-sub" x="1250" y="4584" text-anchor="middle">Yield / Purity / Trace</text>

  <path class="node gate" d="M1250 4745 L1560 4825 L1250 4905 L940 4825 Z" />
  <text class="node-title" x="1250" y="4818" text-anchor="middle">纯化 QC</text>
  <text class="node-sub" x="1250" y="4858" text-anchor="middle">收率 / 纯度 / 追溯</text>

  <rect class="node issue" x="420" y="4940" width="640" height="130" rx="22" />
  <text class="node-title" x="740" y="4995" text-anchor="middle">纯化补跑工单</text>
  <text class="node-sub" x="740" y="5033" text-anchor="middle">补纯化 / 人工复核</text>

  <rect class="node work" x="1750" y="4480" width="640" height="150" rx="22" />
  <text class="node-title" x="2070" y="4542" text-anchor="middle">酶活与稳定性检测</text>
  <text class="node-sub" x="2070" y="4584" text-anchor="middle">Plate Reader / DSF</text>

  <path class="arrow-callback" d="M430 2730 L430 2855" />
  <path class="arrow-return" d="M140 2945 C45 3010 55 3140 170 3195" />
  <text class="label" x="160" y="2895">失败</text>
  <path class="arrow-return" d="M410 3200 C350 2980 340 2740 395 2455" />
  <path class="arrow" d="M720 2945 C920 3000 1080 3100 1190 3195" />
  <text class="label" x="740" y="2910">通过</text>
  <path class="arrow-callback" d="M1250 2730 L1250 3195" />
  <path class="arrow-callback" d="M2070 2730 L2070 3195" />
  <path class="arrow-callback" d="M1250 3350 L1250 3475" />
  <path class="arrow-callback" d="M1250 3630 L1250 3745" />
  <path class="arrow-return" d="M940 3835 C750 3860 720 3970 740 4045" />
  <text class="label" x="920" y="3790">否</text>
  <path class="arrow-return" d="M740 4050 C600 3680 820 2840 1220 2175" />
  <path class="arrow" d="M1250 3915 L1250 4255" />
  <text class="label" x="1305" y="4000">通过</text>
  <path class="arrow-callback" d="M1250 4410 L1250 4475" />
  <path class="arrow-callback" d="M1250 4630 L1250 4735" />
  <path class="arrow-return" d="M940 4825 C790 4820 765 4895 795 4935" />
  <text class="label" x="920" y="4785">失败</text>
  <path class="arrow-return" d="M740 4940 C640 4680 760 4350 925 4335" />
  <path class="arrow" d="M1560 4825 C1750 4825 1895 4700 2020 4635" />
  <text class="label" x="1600" y="4785">通过</text>
  <path class="arrow-soft" d="M2070 3350 L2070 4475" />

  <!-- Data layer -->
  <rect class="node callback" x="1750" y="4720" width="640" height="150" rx="22" />
  <text class="node-title" x="2070" y="4782" text-anchor="middle">检测数据回调</text>
  <text class="node-sub" x="2070" y="4824" text-anchor="middle">Raw Reads / Curves / QC Flags</text>

  <rect class="node data" x="930" y="4980" width="640" height="150" rx="22" />
  <text class="node-title" x="1250" y="5042" text-anchor="middle">数据入库与标准化</text>
  <text class="node-sub" x="1250" y="5084" text-anchor="middle">LIMS + ELN Ingest</text>

  <path class="node gate" d="M1250 5250 L1560 5335 L1250 5420 L940 5335 Z" />
  <text class="node-title" x="1250" y="5328" text-anchor="middle">数据完整性检查</text>
  <text class="node-sub" x="1250" y="5368" text-anchor="middle">缺失 / 冲突 / 版本</text>

  <rect class="node issue" x="250" y="5570" width="640" height="150" rx="22" />
  <text class="node-title" x="570" y="5632" text-anchor="middle">数据追补工单</text>
  <text class="node-sub" x="570" y="5674" text-anchor="middle">Callback / Manual Review</text>

  <rect class="node output" x="930" y="5570" width="640" height="150" rx="22" />
  <text class="node-title" x="1250" y="5632" text-anchor="middle">结果包生成</text>
  <text class="node-sub" x="1250" y="5674" text-anchor="middle">Result Package</text>

  <rect class="node output" x="930" y="5810" width="640" height="150" rx="22" />
  <text class="node-title" x="1250" y="5872" text-anchor="middle">效率分析</text>
  <text class="node-sub" x="1250" y="5914" text-anchor="middle">TAT / 瓶颈 / 失败率</text>

  <rect class="node user" x="930" y="6050" width="640" height="130" rx="22" />
  <text class="node-title" x="1250" y="6105" text-anchor="middle">负责人摘要</text>
  <text class="node-sub" x="1250" y="6143" text-anchor="middle">状态 / 异常 / 下一步</text>

  <path class="arrow-callback" d="M2070 4630 L2070 4715" />
  <path class="arrow-callback" d="M2070 4870 C1900 4935 1710 4980 1575 5050" />
  <path class="arrow" d="M1250 5130 L1250 5240" />
  <path class="arrow" d="M940 5335 C770 5350 640 5470 590 5565" />
  <text class="label" x="690" y="5320">缺失或冲突</text>
  <path class="arrow-return" d="M570 5570 C430 5400 650 5070 925 5055" />
  <path class="arrow" d="M1250 5420 L1250 5565" />
  <text class="label" x="1305" y="5485">通过</text>
  <path class="arrow" d="M1250 5720 L1250 5805" />
  <path class="arrow" d="M1250 5960 L1250 6045" />

  <!-- Legend -->
  <rect x="120" y="180" width="2280" height="72" rx="18" fill="#ffffff" stroke="#e2e8f0" />
  <circle cx="170" cy="216" r="14" fill="#eff6ff" stroke="#60a5fa" stroke-width="4" />
  <text class="small" x="195" y="225">负责人动作</text>
  <circle cx="410" cy="216" r="14" fill="#f0fdfa" stroke="#2dd4bf" stroke-width="4" />
  <text class="small" x="435" y="225">Pipeline / 自动编排</text>
  <circle cx="770" cy="216" r="14" fill="#f1f5f9" stroke="#94a3b8" stroke-width="4" />
  <text class="small" x="795" y="225">工单/执行节点</text>
  <circle cx="1080" cy="216" r="14" fill="#ecfeff" stroke="#22d3ee" stroke-width="4" />
  <text class="small" x="1105" y="225">设备/系统回调</text>
  <circle cx="1400" cy="216" r="14" fill="#fffbeb" stroke="#f59e0b" stroke-width="4" />
  <text class="small" x="1425" y="225">QC Gate</text>
  <circle cx="1660" cy="216" r="14" fill="#fff7ed" stroke="#fb923c" stroke-width="4" />
  <text class="small" x="1685" y="225">异常/补救工单</text>
  <circle cx="2000" cy="216" r="14" fill="#f0fdf4" stroke="#22c55e" stroke-width="4" />
  <text class="small" x="2025" y="225">数据入库</text>
  <circle cx="2250" cy="216" r="14" fill="#faf5ff" stroke="#a855f7" stroke-width="4" />
